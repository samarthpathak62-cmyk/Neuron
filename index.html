<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HuggingChat Clone - Zero Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; height: 100dvh; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .prose pre { background: #111827; color: #e5e7eb; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 0.5rem 0; font-size: 0.875rem; }
        .prose code { background: rgba(0,0,0,0.1); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; }
        .dark .prose code { background: rgba(255,255,255,0.1); }
        .typing-cursor::after { content: '●'; animation: blink 0.8s infinite; margin-left: 2px; color: #3b82f6; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #loading { position: fixed; inset: 0; background: #ffffff; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
        .dark #loading { background: #0f172a; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-slate-950 dark:text-gray-100 transition-colors duration-200">

    <div id="loading">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="font-medium animate-pulse">Hugging Face Interface Loading...</p>
    </div>

    <div class="flex h-screen w-full relative overflow-hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-900 transform -translate-x-full lg:translate-x-0 border-r border-gray-200 dark:border-slate-800 flex flex-col shadow-xl lg:shadow-none">
            <div class="p-4">
                <button onclick="createNewChat()" class="flex items-center gap-2 w-full bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/40 p-3 rounded-xl font-semibold transition-all">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> New Chat
                </button>
            </div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-2 no-scrollbar"></div>

            <div class="p-4 border-t dark:border-slate-800 space-y-1">
                <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2.5 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg transition">
                    <i data-lucide="settings" class="w-5 h-5 text-gray-500"></i> <span class="text-sm">API Settings</span>
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-2.5 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg transition">
                    <i data-lucide="moon" id="dark-mode-icon" class="w-5 h-5 text-gray-500"></i> <span class="text-sm">Toggle Theme</span>
                </button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden lg:hidden"></div>

        <main class="flex-1 flex flex-col min-w-0 lg:ml-72 h-full relative">
            <header class="h-16 flex items-center justify-between px-4 border-b dark:border-slate-800 bg-white/70 dark:bg-slate-950/70 backdrop-blur-md sticky top-0 z-30">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <h1 id="current-chat-title" class="font-bold text-lg truncate max-w-[200px] md:max-w-md">HuggingChat</h1>
                </div>
                <div id="model-badge" class="text-[10px] bg-gray-100 dark:bg-slate-800 px-2 py-1 rounded uppercase font-bold text-gray-500 tracking-wider">
                    Loading...
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-32 space-y-8 no-scrollbar pb-40">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center space-y-6 pt-20">
                    <div class="w-16 h-16 bg-gradient-to-tr from-blue-600 to-purple-500 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i data-lucide="bot" class="w-10 h-10 text-white"></i>
                    </div>
                    <div>
                        <h2 class="text-3xl font-extrabold tracking-tight">How can I help you?</h2>
                        <p class="text-gray-500 mt-2">Powered by Hugging Face Inference API</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-slate-950 via-gray-50 dark:via-slate-950 to-transparent">
                <div class="max-w-4xl mx-auto">
                    <div class="relative flex items-end bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-700 rounded-2xl shadow-xl focus-within:border-blue-500 transition-all p-2">
                        <textarea id="user-input" rows="1" placeholder="Type your message here..." 
                            class="w-full p-3 bg-transparent border-none focus:ring-0 resize-none max-h-48 overflow-y-auto text-sm md:text-base"
                            oninput="autoResize(this)"></textarea>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-all disabled:opacity-30">
                            <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <p class="text-[10px] text-center mt-3 text-gray-400">Response is generated via Hugging Face. Check tokens in settings.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-6 shadow-2xl border dark:border-slate-800">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">API Configuration</h3>
                <button onclick="toggleSettings()" class="p-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Hugging Face Token (HF_...)</label>
                    <input type="password" id="api-key" class="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 focus:ring-2 ring-blue-500 outline-none transition" placeholder="Paste your Read/Write token">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Model Repository ID</label>
                    <input type="text" id="model-name" class="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 focus:ring-2 ring-blue-500 outline-none transition" placeholder="e.g. meta-llama/Llama-3.2-3B-Instruct">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-2">Global System Prompt</label>
                    <textarea id="system-prompt" rows="3" class="w-full p-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 focus:ring-2 ring-blue-500 outline-none transition" placeholder="You are a helpful AI..."></textarea>
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-500/30 transition-all active:scale-95">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // --- State ---
        let state = {
            apiKey: localStorage.getItem('hf_key') || '',
            model: localStorage.getItem('hf_model') || 'meta-llama/Llama-3.2-3B-Instruct',
            systemPrompt: localStorage.getItem('hf_system') || 'You are a professional AI assistant.',
            chats: JSON.parse(localStorage.getItem('hf_chats')) || [],
            currentChatId: null,
            isDark: localStorage.getItem('hf_dark') === 'true',
            isStreaming: false
        };

        // --- Init ---
        window.addEventListener('DOMContentLoaded', () => {
            if (state.isDark) document.documentElement.classList.add('dark');
            updateDarkModeUI();
            renderChatList();
            lucide.createIcons();
            
            document.getElementById('api-key').value = state.apiKey;
            document.getElementById('model-name').value = state.model;
            document.getElementById('system-prompt').value = state.systemPrompt;
            document.getElementById('model-badge').innerText = state.model.split('/').pop();

            if (state.chats.length > 0) loadChat(state.chats[0].id);
            
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
        });

        // --- Core Logic ---
        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || state.isStreaming) return;
            if (!state.apiKey) return alert('Please add your Hugging Face Token in Settings!');

            if (!state.currentChatId) createNewChat(text);
            
            addMessage('user', text);
            input.value = '';
            autoResize(input);
            
            await callHuggingFaceStream(text);
        }

        async function callHuggingFaceStream(userText) {
            state.isStreaming = true;
            document.getElementById('send-btn').disabled = true;
            
            const chat = state.chats.find(c => c.id === state.currentChatId);
            const aiMsgId = addMessage('assistant', '');
            const msgElement = document.getElementById(`msg-text-${aiMsgId}`);
            let fullResponse = "";

            try {
                // Formatting conversation for Llama/Instruct models
                const messages = [
                    { role: "system", content: state.systemPrompt },
                    ...chat.messages.map(m => ({ role: m.role, content: m.content }))
                ];

                const response = await fetch(`https://api-inference.huggingface.co/models/${state.model}/v1/chat/completions`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${state.apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: messages,
                        max_tokens: 2000,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`HF Error: ${response.statusText}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr.trim() === '[DONE]') break;
                            
                            try {
                                const json = JSON.parse(dataStr);
                                const token = json.choices[0].delta.content || "";
                                fullResponse += token;
                                msgElement.innerHTML = marked.parse(fullResponse + '<span class="typing-cursor"></span>');
                                scrollChat();
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                msgElement.innerHTML = `<span class="text-red-500 font-medium">Error: ${error.message}. Make sure the model supports Chat API and your token is valid.</span>`;
            } finally {
                msgElement.innerHTML = marked.parse(fullResponse);
                chat.messages.push({ role: 'assistant', content: fullResponse });
                saveChats();
                state.isStreaming = false;
                document.getElementById('send-btn').disabled = false;
                lucide.createIcons();
            }
        }

        // --- UI Logic ---
        function addMessage(role, content, save = true) {
            const container = document.getElementById('chat-container');
            document.getElementById('empty-state').classList.add('hidden');
            const id = Date.now();
            const isAI = role === 'assistant';
            
            const html = `
                <div class="flex ${isAI ? 'justify-start' : 'justify-end'} group">
                    <div class="max-w-[88%] md:max-w-[75%] rounded-2xl p-4 ${
                        isAI ? 'bg-white dark:bg-slate-900 border border-gray-100 dark:border-slate-800 shadow-sm' 
                             : 'bg-blue-600 text-white shadow-lg'
                    }">
                        <div id="msg-text-${id}" class="prose dark:prose-invert max-w-none text-sm leading-relaxed">
                            ${marked.parse(content)}
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            scrollChat();
            if (save && !isAI) {
                state.chats.find(c => c.id === state.currentChatId).messages.push({ role, content });
                saveChats();
            }
            return id;
        }

        function createNewChat(title = 'New Chat') {
            const id = Date.now().toString();
            state.chats.unshift({ id, title: title.substring(0, 30), messages: [] });
            state.currentChatId = id;
            saveChats();
            renderChatList();
            loadChat(id);
        }

        function loadChat(id) {
            state.currentChatId = id;
            const chat = state.chats.find(c => c.id === id);
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            
            if (chat.messages.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
                chat.messages.forEach(m => addMessage(m.role, m.content, false));
            }
            document.getElementById('current-chat-title').innerText = chat.title;
            renderChatList();
            if (window.innerWidth < 1024) toggleSidebar(false);
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(chat => `
                <div onclick="loadChat('${chat.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${state.currentChatId === chat.id ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-100 dark:hover:bg-slate-800'}">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i data-lucide="message-circle" class="w-4 h-4 shrink-0"></i>
                        <span class="truncate text-sm font-medium">${chat.title}</span>
                    </div>
                    <button onclick="deleteChat('${chat.id}', event)" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteChat(id, e) {
            e.stopPropagation();
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) state.currentChatId = null;
            saveChats();
            location.reload();
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key').value;
            state.model = document.getElementById('model-name').value;
            state.systemPrompt = document.getElementById('system-prompt').value;
            localStorage.setItem('hf_key', state.apiKey);
            localStorage.setItem('hf_model', state.model);
            localStorage.setItem('hf_system', state.systemPrompt);
            document.getElementById('model-badge').innerText = state.model.split('/').pop();
            toggleSettings();
        }

        function toggleSidebar(force) {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            const open = force !== undefined ? force : sb.classList.contains('-translate-x-full');
            sb.classList.toggle('-translate-x-full', !open);
            ov.classList.toggle('hidden', !open);
        }

        function toggleDarkMode() {
            state.isDark = !state.isDark;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('hf_dark', state.isDark);
            updateDarkModeUI();
        }

        function updateDarkModeUI() {
            const icon = document.getElementById('dark-mode-icon');
            icon.setAttribute('data-lucide', state.isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
        function scrollChat() { const c = document.getElementById('chat-container'); c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }); }
        function saveChats() { localStorage.setItem('hf_chats', JSON.stringify(state.chats)); }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
    </script>
</body>
</html>
