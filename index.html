<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neuron-14B Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .typing-cursor::after { content: '●'; animation: blink 1s infinite; color: #3b82f6; margin-left: 4px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #loading-overlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dark #loading-overlay { background: #0f172a; color: white; }
        .chat-bubble { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 dark:text-gray-100 transition-colors duration-300">

    <div id="loading-overlay">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-lg tracking-tight">Initializing Neuron-14B...</p>
    </div>

    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-900 border-r dark:border-slate-800 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col">
            <div class="p-6">
                <button onclick="createNewChat()" class="w-full flex items-center justify-center gap-2 bg-slate-950 dark:bg-blue-600 text-white p-3 rounded-2xl font-bold hover:opacity-90 transition shadow-xl shadow-blue-500/10">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> New Chat
                </button>
            </div>
            <div id="chat-list" class="flex-1 overflow-y-auto px-4 space-y-2 no-scrollbar"></div>
            <div class="p-4 border-t dark:border-slate-800 space-y-2">
                <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-3 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-xl transition font-medium text-sm">
                    <i data-lucide="settings" class="w-5 h-5 text-gray-500"></i> API Settings
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-3 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-xl transition font-medium text-sm">
                    <i data-lucide="moon" id="theme-icon" class="w-5 h-5 text-gray-500"></i> Appearance
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 flex flex-col relative h-full">
            <header class="h-16 flex items-center justify-between px-6 border-b dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-xl z-40">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden"><i data-lucide="menu"></i></button>
                    <h1 id="header-title" class="font-bold text-slate-800 dark:text-white truncate max-w-[150px] md:max-w-none">Neuron-14B</h1>
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-gray-500">HF-Inference</span>
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 no-scrollbar pb-32">
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-center px-4">
                    <div class="w-20 h-20 bg-blue-100 dark:bg-blue-900/30 rounded-3xl flex items-center justify-center mb-6">
                        <i data-lucide="brain-circuit" class="w-10 h-10 text-blue-600"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold text-slate-800 dark:text-white">Neuron-14B is Ready</h2>
                    <p class="text-gray-500 mt-2 max-w-sm">Enter your message below to start a conversation with the Neuron model.</p>
                </div>
            </div>

            <div class="absolute bottom-0 inset-x-0 p-4 bg-gradient-to-t from-gray-50 dark:from-slate-950">
                <div class="max-w-4xl mx-auto">
                    <div class="relative flex items-end bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-2xl focus-within:ring-2 ring-blue-500/50 transition-all p-2">
                        <textarea id="user-input" rows="1" class="flex-1 p-3 bg-transparent outline-none resize-none max-h-40 text-sm md:text-base" placeholder="Ask Neuron something..."></textarea>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-slate-900 dark:bg-blue-600 text-white rounded-2xl hover:scale-105 transition-transform disabled:opacity-50">
                            <i data-lucide="arrow-up" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-950/60 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl border dark:border-slate-800">
            <h3 class="text-2xl font-bold mb-6">Settings</h3>
            <div class="space-y-6">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-tighter ml-1">HF Access Token</label>
                    <input type="password" id="api-key" class="w-full mt-2 p-4 rounded-2xl border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 ring-blue-500" placeholder="hf_...">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-tighter ml-1">Model Repository</label>
                    <input type="text" id="model-name" class="w-full mt-2 p-4 rounded-2xl border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 ring-blue-500" placeholder="Anandnrnnffn/Neuron-14B">
                </div>
                <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/20 active:scale-95 transition">Save Configuration</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            key: localStorage.getItem('neuron_key') || '',
            model: localStorage.getItem('neuron_model') || 'Anandnrnnffn/Neuron-14B',
            chats: JSON.parse(localStorage.getItem('neuron_history')) || [],
            currentId: null,
            isDark: localStorage.getItem('neuron_dark') === 'true'
        };

        window.onload = () => {
            if(state.isDark) document.documentElement.classList.add('dark');
            document.getElementById('api-key').value = state.key;
            document.getElementById('model-name').value = state.model;
            renderChatList();
            lucide.createIcons();
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 800);
        };

        function saveSettings() {
            state.key = document.getElementById('api-key').value.trim();
            state.model = document.getElementById('model-name').value.trim();
            localStorage.setItem('neuron_key', state.key);
            localStorage.setItem('neuron_model', state.model);
            toggleSettings();
            alert("Settings Updated!");
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !state.key) return alert("Bhai, Settings mein HF Token daalo pehle!");

            if (!state.currentId) createNewChat(text);
            
            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';

            const aiId = addMessage('assistant', 'Neuron is thinking...');
            const msgBox = document.getElementById(`msg-${aiId}`);
            msgBox.classList.add('typing-cursor');

            try {
                const response = await fetch(`https://api-inference.huggingface.co/models/${state.model}`, {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${state.key}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ 
                        inputs: `<s>[INST] ${text} [/INST]`, // Format for Neuron/Llama models
                        parameters: { max_new_tokens: 1024, temperature: 0.7, top_p: 0.9, return_full_text: false }
                    })
                });

                const data = await response.json();
                
                let output = "";
                if (data.error) {
                    if(data.error.includes("loading")) {
                        output = "⚠️ Model load ho raha hai (14B bada model hai). 20-30 seconds baad dobara message bhejiyega.";
                    } else {
                        output = "Error: " + data.error;
                    }
                } else if (Array.isArray(data)) {
                    output = data[0].generated_text || "No response.";
                } else {
                    output = "Hugging Face se invalid response aaya.";
                }

                msgBox.innerHTML = marked.parse(output);
                state.chats.find(c => c.id === state.currentId).messages.push({role: 'assistant', content: output});
                localStorage.setItem('neuron_history', JSON.stringify(state.chats));
            } catch (err) {
                msgBox.innerText = "Network Error: " + err.message;
            } finally {
                msgBox.classList.remove('typing-cursor');
                lucide.createIcons();
                scrollChat();
            }
        }

        function addMessage(role, text) {
            document.getElementById('empty-state').classList.add('hidden');
            const id = Date.now();
            const isAi = role === 'assistant';
            const html = `
                <div class="flex ${isAi ? 'justify-start' : 'justify-end'} animate-in fade-in slide-in-from-bottom-4 duration-300">
                    <div class="max-w-[85%] p-5 rounded-[2rem] shadow-sm ${isAi ? 'bg-white dark:bg-slate-900 border dark:border-slate-800 text-slate-800 dark:text-gray-200' : 'bg-slate-950 dark:bg-blue-600 text-white'} chat-bubble">
                        <div class="text-[10px] uppercase font-black tracking-widest opacity-40 mb-2">${role}</div>
                        <div id="msg-${id}" class="prose dark:prose-invert text-sm leading-relaxed">${marked.parse(text)}</div>
                    </div>
                </div>`;
            document.getElementById('chat-container').insertAdjacentHTML('beforeend', html);
            if(role === 'user') {
                const chat = state.chats.find(c => c.id === state.currentId);
                if(chat) chat.messages.push({role, content: text});
            }
            scrollChat();
            return id;
        }

        function createNewChat(t = "New Neuron Chat") {
            const id = Date.now().toString();
            state.currentId = id;
            state.chats.unshift({ id, title: t.slice(0, 25), messages: [] });
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = state.chats.map(c => `
                <div onclick="state.currentId='${c.id}'; renderChatList(); loadHistory('${c.id}')" class="p-4 rounded-2xl cursor-pointer transition-all ${state.currentId === c.id ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400' : 'hover:bg-gray-100 dark:hover:bg-slate-800'}">
                    <p class="truncate text-sm font-bold">${c.title}</p>
                </div>`).join('');
        }

        function loadHistory(id) {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            const chat = state.chats.find(c => c.id === id);
            chat.messages.forEach(m => addMessage(m.role, m.content, false));
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
        function toggleDarkMode() {
            state.isDark = !state.isDark;
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('neuron_dark', state.isDark);
        }
        function scrollChat() { 
            const c = document.getElementById('chat-container');
            c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
        }
        document.getElementById('user-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
